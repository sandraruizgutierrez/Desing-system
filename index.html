<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Studio Interactivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style id="dynamicButtonStyles"></style>
  </head>
  <body>
    <div class="px-5 py-6 lg:px-8 lg:py-8">
      <div class="mx-auto w-full">
        <div class="mb-5 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight text-slate-950">Design Studio</h1>
          </div>
          <div class="flex flex-wrap items-center justify-end gap-2">
            <div class="panel-card inline-flex w-fit rounded-2xl p-1.5">
              <button class="device-btn is-active rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition" data-device="desktop" type="button">Desktop</button>
            </div>
            <div class="panel-card inline-flex w-fit rounded-2xl p-1.5">
              <button id="exportBtn" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-950" type="button">Exportar</button>
              <button id="importBtn" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-950" type="button">Importar</button>
              <button id="kitBtn" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-950" type="button">Kit</button>
              <button id="sheetBtn" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-950" type="button">Hoja de estilo</button>
            </div>
            <input id="importFile" type="file" accept="application/json" class="hidden" />
          </div>
        </div>

        <div class="panel-card rounded-3xl p-4">
          <div class="mb-4 hidden flex-wrap items-center justify-between gap-3">
            <div>
              <p id="deviceMeta" class="text-sm font-medium text-slate-500"></p>
            </div>
            <div id="tokenBadge" class="rounded-full px-3 py-1 text-xs font-semibold"></div>
          </div>

          <div>
            <section class="mini-grid preview-surface overflow-x-auto rounded-2xl border border-slate-200/80 p-0">
              <div id="canvasFrame" class="canvas-frame w-full overflow-hidden rounded-2xl border border-slate-200 bg-slate-50">
                <div id="previewCanvas" class="space-y-4 p-0"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>

        <!-- Modern editor modal (replaces native prompt()) -->
    <div id="editorModal" class="fixed inset-0 z-50 hidden">
      <div id="editorBackdrop" class="absolute inset-0 bg-slate-950/30 backdrop-blur-[2px]"></div>
      <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="panel-card w-full max-w-4xl rounded-3xl p-4 shadow-2xl">
          <div id="editorHeader" class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p id="editorKicker" class="text-xs font-semibold tracking-[0.16em] text-slate-500"></p>
              <h3 id="editorTitle" class="mt-2 truncate text-lg font-semibold text-slate-950"></h3>
              <p id="editorDesc" class="mt-1 text-sm leading-6 text-slate-600"></p>
            </div>
            <button id="editorClose" type="button" class="rounded-xl px-3 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-950">Cerrar</button>
          </div>

          <div class="mt-4 space-y-3">
            <div id="editorRowColor" class="hidden items-center gap-3">
              <input id="editorColor" type="color" class="h-11 w-14 cursor-pointer rounded-xl border border-slate-200 bg-white p-1" />
              <div class="min-w-0 flex-1">
                <label for="editorInput" class="block text-xs font-medium text-slate-500">Hex</label>
                <input
                  id="editorInput"
                  class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 font-mono text-sm font-semibold text-slate-900 outline-none ring-0 transition focus:border-slate-300 focus:ring-4 focus:ring-slate-200/60"
                  autocomplete="off"
                  spellcheck="false"
                  inputmode="text"
                />
              </div>
            </div>

            <div id="editorRowText" class="hidden">
              <input
                id="editorInputText"
                class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 font-mono text-sm font-semibold text-slate-900 outline-none ring-0 transition focus:border-slate-300 focus:ring-4 focus:ring-slate-200/60"
                autocomplete="off"
                spellcheck="false"
                inputmode="text"
              />
            </div>

            <div id="editorRowTextarea" class="hidden">
              <label for="editorTextarea" class="block text-xs font-medium text-slate-500">CSS del kit</label>
              <textarea
                id="editorTextarea"
                class="mt-1 h-80 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 font-mono text-[12px] font-medium leading-6 text-slate-900 outline-none ring-0 transition focus:border-slate-300 focus:ring-4 focus:ring-slate-200/60"
                spellcheck="false"
              ></textarea>
            </div>

            <p id="editorError" class="hidden text-sm font-medium text-rose-700"></p>
          </div>

          <div class="mt-5 flex items-center justify-between gap-2">
            <button id="editorDelete" type="button" class="hidden rounded-2xl px-4 py-2.5 text-sm font-semibold text-rose-700 ring-1 ring-rose-200 transition hover:bg-rose-50">Eliminar</button>
            <div class="ml-auto flex items-center gap-2">
            <button id="editorCancel" type="button" class="rounded-2xl px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 transition hover:ring-slate-300">Cancelar</button>
            <button id="editorOk" type="button" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-900">Guardar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Typography editor modal (table-style) -->
    <div id="typeModal" class="fixed inset-0 z-50 hidden">
      <div id="typeBackdrop" class="absolute inset-0 bg-slate-950/30 backdrop-blur-[2px]"></div>
      <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="panel-card w-full max-w-4xl rounded-3xl p-4 shadow-2xl">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-xs font-semibold tracking-[0.16em] text-slate-500">Tipografía</p>
              <h3 id="typeTitle" class="mt-2 truncate text-lg font-semibold text-slate-950"></h3>
              <p id="typeDesc" class="mt-1 text-sm leading-6 text-slate-600"></p>
            </div>
            <button id="typeClose" type="button" class="rounded-xl px-3 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-950">Cerrar</button>
          </div>

          <div class="mt-4 space-y-3">
            <div class="grid gap-3 sm:grid-cols-2">
              <div>
                <label class="block text-xs font-medium text-slate-500">Familia tipográfica</label>
                <input id="typeFamily" class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-900 outline-none transition focus:border-slate-300 focus:ring-4 focus:ring-slate-200/60" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500">Grupo</label>
                <input id="typeGroup" class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-900 outline-none transition focus:border-slate-300 focus:ring-4 focus:ring-slate-200/60" disabled />
              </div>
            </div>

          <div class="overflow-auto rounded-2xl border border-slate-200 bg-white">
              <table class="w-full min-w-[780px] border-separate border-spacing-0">
                <thead class="sticky top-0 bg-slate-50">
                  <tr class="text-left text-xs font-semibold text-slate-600">
                    <th class="border-b border-slate-200 px-4 py-3">Alias</th>
                    <th class="border-b border-slate-200 px-4 py-3">Size (px)</th>
                    <th class="border-b border-slate-200 px-4 py-3">Weight</th>
                    <th class="border-b border-slate-200 px-4 py-3">Line-height</th>
                    <th class="border-b border-slate-200 px-4 py-3">Letter-space (em)</th>
                  </tr>
                </thead>
                <tbody id="typeRows"></tbody>
              </table>
            </div>

            <p id="typeError" class="hidden text-sm font-medium text-rose-700"></p>
          </div>

          <div class="mt-5 flex items-center justify-end gap-2">
            <button id="typeCancel" type="button" class="rounded-2xl px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 transition hover:ring-slate-300">Cancelar</button>
            <button id="typeSave" type="button" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-900">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="buttonModal" class="fixed inset-0 z-50 hidden">
      <div id="buttonBackdrop" class="absolute inset-0 bg-slate-950/30 backdrop-blur-[2px]"></div>
      <div class="absolute inset-0 flex items-start justify-center px-4 py-6">
        <div class="panel-card w-[min(98vw,100rem)] max-h-[calc(100vh-3rem)] overflow-hidden rounded-3xl p-3 shadow-2xl">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-xs font-semibold tracking-[0.16em] text-slate-500">Botones</p>
              <h3 id="buttonTitle" class="mt-2 truncate text-lg font-semibold text-slate-950"></h3>
              <p id="buttonDesc" class="mt-1 text-sm leading-6 text-slate-600"></p>
            </div>
            <button id="buttonClose" type="button" class="rounded-xl px-3 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-950">Cerrar</button>
          </div>

          <div class="mt-3 max-h-[calc(100vh-11rem)] space-y-3 overflow-y-auto pr-1">
            <div class="sticky top-0 z-20 rounded-3xl border border-slate-200 bg-slate-50 p-3 shadow-sm">
              <div class="flex items-center justify-between gap-2">
                <div>
                  <p class="text-xs font-semibold tracking-[0.18em] text-slate-500">Vista previa</p>
                  <p id="buttonActiveValue" class="mt-1 text-xs font-medium text-slate-600"></p>
                </div>
                <button id="buttonResetDraft" type="button" class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-700 ring-1 ring-slate-200 hover:bg-slate-200">Restaurar</button>
              </div>
              <div id="buttonPreview" class="mt-3"></div>
            </div>
            <div id="buttonFields" class="space-y-3"></div>
          </div>

          <p id="buttonError" class="hidden mt-2 text-sm font-medium text-rose-700"></p>

          <div class="mt-3 flex items-center justify-end gap-2">
            <button id="buttonDelete" type="button" class="hidden rounded-2xl px-4 py-2.5 text-sm font-semibold text-rose-700 ring-1 ring-rose-200 transition hover:bg-rose-50">Eliminar</button>
            <button id="buttonCancel" type="button" class="rounded-2xl px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 transition hover:ring-slate-300">Cancelar</button>
            <button id="buttonSave" type="button" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-900">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
